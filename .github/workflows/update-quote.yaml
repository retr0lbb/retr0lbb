name: Update Dev Quote

on:
  schedule:
    - cron: '0 12 */3 * *' # Roda a cada 3 dias ao meio-dia UTC
  workflow_dispatch:        # Permite rodar manualmente pela UI do GitHub

jobs:
  update-quote:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update quote in README
        run: |
          QUOTE=$(python3 -c "
          import json, random
          with open('files/quotes.json') as f:
              data = json.load(f)
          print(random.choice(data['quotes']))
          ")

          echo "Frase escolhida: $QUOTE"

          python3 -c "
          import re
          with open('README.md', 'r') as f:
              content = f.read()

          updated = re.sub(
              r'<!-- QUOTE -->.*?<!-- /QUOTE -->',
              '<!-- QUOTE --> $QUOTE <!-- /QUOTE -->',
              content
          )

          with open('README.md', 'w') as f:
              f.write(updated)
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dev quote 💬"
          branch: chore/update-dev-quote
          delete-branch: true
          title: "chore: update dev quote 💬"
          body: |
            Atualização automática da frase do README.

            > Gerado pelo workflow **Update Dev Quote** 🤖
          labels: automated